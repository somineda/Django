{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light justify-content-between px-5">
        <a class="navbar-brand" href="{% url 'cbv_todo_list' %}">Home</a>
        <div class="d-flex">
            {% if request.user.is_authenticated %}
                <span class="navbar-text me-3">{{ request.user.username }}</span>
                <form method="POST" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button class="btn btn-outline-danger btn-sm">Logout</button>
                </form>
            {% else %}
                <a class="btn btn-outline-primary me-2" href="{% url 'signup' %}">Sign Up</a>
                <a class="btn btn-outline-success" href="{% url 'login' %}">Login</a>
            {% endif %}
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
