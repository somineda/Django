<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo List</title>
</head>
<body>
    <nav style="display: flex; justify-content: space-between; padding: 10px 20px; background-color: #f5f5f5; align-items: center;">
        <div>
            <a style="font-size: 20px; text-decoration: none;" href="{% url 'todo_list' %}">Home</a>
        </div>

        {% if request.user.is_authenticated %}
            <div style="font-size: 18px; display: flex; align-items: center; gap: 10px;">
                <span>{{ request.user.username }}</span>
                <form action="{% url 'logout' %}" method="POST" style="margin: 0;">
                    {% csrf_token %}
                    <button style="border: 0; font-size: 16px; background: none; cursor: pointer; color: blue;">Logout</button>
                </form>
            </div>
        {% else %}
            <div style="font-size: 18px;">
                <a href="{% url 'signup' %}" style="margin-right: 15px; text-decoration: none;">SignUp</a>
                <a href="{% url 'login' %}" style="text-decoration: none;">Login</a>
            </div>
        {% endif %}
    </nav>

    <div style="padding: 20px;">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
