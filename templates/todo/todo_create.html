{% extends 'todo/base.html' %}
{% block content %}
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 600px;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

h2 {
    text-align: center;
    color: #333;
    margin-bottom: 20px;
}

/* 폼 스타일 */
.todo-create-form {
    display: flex;
    flex-direction: column;
}

/* 폼 내부 p 태그 간격 */
.todo-create-form p {
    margin: 10px 0;
}

/* 입력 필드 */
input[type="text"],
input[type="date"],
textarea,
input[type="file"],
select {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    margin-bottom: 15px;
}

/* 제출 버튼 */
.create-button {
    background-color: #007bff;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
}

.create-button:hover {
    background-color: #0056b3;
}
</style>

<div class="container" style="margin-top: 30px">
    {% if request.user.is_authenticated %}
        <h2>Todo 생성하기</h2>
        <form class="todo-create-form" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="create-button">Create</button>
        </form>
    {% endif %}
</div>
{% endblock %}
