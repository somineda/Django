{% extends 'todo/base.html' %}

{% block content %}
<div class="container" style="
    max-width: 600px;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);">

    <h1 style="text-align: center; color: #333;">{{ todo.title }}</h1>

    <table style="
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;">
        {% for key, value in todo.items %}
            {% if key != 'title' %}
            <tr>
                <th style="
                    background: #f0f0f0;
                    width: 30%;
                    padding: 10px;
                    text-align: left;
                    border-bottom: 1px solid #ddd;">
                    {{ key|capfirst }}
                </th>
                <td style="
                    padding: 10px;
                    border-bottom: 1px solid #ddd;">
                    {{ value }}
                </td>
            </tr>
            {% endif %}
        {% endfor %}
    </table>

    <div style="margin-top: 20px; display: flex; justify-content: space-between;">
        <a href="{% url 'cbv_todo_update' todo.id %}" style="
            padding: 8px 16px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;">
            수정하기
        </a>
        <form action="{% url 'cbv_todo_delete' todo.id %}" method="POST">
            {% csrf_token %}
            <button type="submit" style="
                padding: 8px 16px;
                background-color: #dc3545;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;">
                삭제하기
            </button>
        </form>
    </div>
</div>
{% endblock %}
