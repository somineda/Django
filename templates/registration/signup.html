{% extends 'registration/base.html' %}
{% block content %}
<style>
    .signup-container {
        max-width: 400px;
        margin: 50px auto;
        padding: 20px;
        background: white;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .signup-container h1 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
    }

    .signup-form {
        display: flex;
        flex-direction: column;
    }

    .signup-form p {
        margin: 10px 0;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"],
    input[type="date"],
    select,
    textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        margin-bottom: 15px;
    }

    .signup-button {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
        font-size: 16px;
    }

    .signup-button:hover {
        background-color: #0056b3;
    }

    .error-msg {
        color: red;
        font-size: 0.9rem;
        margin-bottom: 10px;
    }
</style>

<div class="signup-container">
    <h1>회원가입</h1>
    <form method="POST" class="signup-form">
        {% csrf_token %}
        {% for field in form %}
            <p>
                {{ field.label_tag }}<br>
                {{ field }}
                {% for error in field.errors %}
                    <div class="error-msg">{{ error }}</div>
                {% endfor %}
            </p>
        {% endfor %}
        {% for error in form.non_field_errors %}
            <div class="error-msg">{{ error }}</div>
        {% endfor %}
        <button type="submit" class="signup-button">Sign Up</button>
    </form>
</div>
{% endblock %}
